name: Lab04 Docker and Newman Verification

on:
  push:
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Build Docker image
        run: docker build -t fit4110/core-business:lab04 .

      - name: Start Access Gate mock server
        run: |
          nohup npx prism mock contracts/access-gate.openapi.yaml --port 4011 --host 0.0.0.0 > gate.log 2>&1 &

      - name: Wait for Access Gate mock
        run: npx wait-on tcp:127.0.0.1:4011 --timeout 60000

      - name: Run Docker container
        run: |
          docker run -d --rm \
            --name fit4110-core-lab04 \
            -p 8000:8000 \
            -e APP_HOST=0.0.0.0 \
            -e APP_PORT=8000 \
            -e AUTH_TOKEN=local-dev-token-real \
            -e SERVICE_NAME=core-business \
            -e SERVICE_VERSION=1.0.0 \
            fit4110/core-business:lab04

      - name: Wait for service health
        run: npx wait-on http-get://127.0.0.1:8000/health --timeout 60000

      - name: Run Newman against Docker container
        run: npm run test:local

      - name: Show container logs on failure
        if: failure()
        run: |
          docker logs fit4110-core-lab04 || true
          cat gate.log || true

      - name: Stop container
        if: always()
        run: docker stop fit4110-core-lab04 || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-newman-reports
          path: reports/
